<link rel="stylesheet" href="css/style.css?v=74">
</head>
<body>
<div id="app">

      <div class="brand-sub">Certificate Ledger</div>
    </div>
    <nav class="sidebar-nav">

      </div>
      <div class="nav-item" data-view="miscrevenue">

        <span data-i18n="nav.integrity">정합성 점검</span>
      </div>
      <div class="nav-item" data-view="auditlog">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v5h5"></path><path d="M12 7v5l3 2"></path></svg></span>

      <div class="nav-item" data-view="importexport">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v14"></path><path d="M3 13l4 4 4-4"></path><path d="M17 21V7"></path><path d="M21 11l-4-4-4 4"></path></svg></span>

      </div>

    <div class="sidebar-footer">
      <div id="operator-chip"></div>
      <div class="lang-toggle">
        <button data-lang="ko" onclick="CertApp.i18n.setLang('ko')">KOR</button>
        <button data-lang="en" onclick="CertApp.i18n.setLang('en')">ENG</button>
      </div>
      <div class="footer-card">
        <div class="footer-title" data-i18n="sidebar.footerTitle">Gift &amp; Service Certificate</div>
        <div class="footer-sub" data-i18n="sidebar.footerSub">관리 대시보드</div>
